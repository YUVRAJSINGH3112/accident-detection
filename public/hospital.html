<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suraksha | Tactical Command Center</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    :root {
      --bg: #030712;
      --card-bg: rgba(17, 24, 39, 0.8);
      --accent: #00f2ff;
      --danger: #ff0055;
      --border: rgba(0, 242, 255, 0.2);
      --map-shadow: 0 0 40px rgba(0, 242, 255, 0.1);
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      margin: 0;
      background: var(--bg);
      color: #e2e8f0;
      display: flex;
      height: 100vh;
      overflow: hidden;
      padding: 20px;
      box-sizing: border-box;
      gap: 20px;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(var(--border) 1px, transparent 1px);
      background-size: 30px 30px;
      opacity: 0.2;
      z-index: -1;
    }

    #sidebar {
      width: 400px;
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      box-shadow: var(--map-shadow);
    }

    .sidebar-header {
      padding: 25px;
      border-bottom: 1px solid var(--border);
    }

    h2 {
      margin: 0;
      font-size: 1.4rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
    }

    #data-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .incident-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      transition: 0.3s;
      animation: slideIn 0.4s ease-out;
    }

    /* Map Box Wrapper with AUTOMATIC animation */
    .map-wrapper {
      flex: 1;
      position: relative;
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      background: #000;
      /* Automatic 1.5s breathing effect */
      animation: autoGlow 1.5s ease-in-out infinite alternate;
    }

    #map {
      width: 100%;
      height: 100%;
      filter: grayscale(0.5) contrast(1.2) brightness(0.8);
      /* Automatic 1.5s zooming effect */
      animation: autoZoom 1.5s ease-in-out infinite alternate;
    }

    /* Animation for the Border and Shadow Glow */
    @keyframes autoGlow {
      0% {
        border-color: var(--border);
        box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
      }
      100% {
        border-color: var(--accent);
        box-shadow: 0 0 50px rgba(0, 242, 255, 0.3);
      }
    }

    /* Animation for the Map Zoom and Color Clarity */
    @keyframes autoZoom {
      0% {
        transform: scale(1);
        filter: grayscale(0.5) contrast(1.2) brightness(0.8);
      }
      100% {
        transform: scale(1.04);
        filter: grayscale(0.1) contrast(1.1) brightness(0.95);
      }
    }

    .hud-corner {
      position: absolute;
      width: 30px;
      height: 30px;
      border: 2px solid var(--accent);
      z-index: 1000;
      pointer-events: none;
      opacity: 0.6;
    }
    .top-left { top: 15px; left: 15px; border-right: 0; border-bottom: 0; }
    .top-right { top: 15px; right: 15px; border-left: 0; border-bottom: 0; }
    .bottom-left { bottom: 15px; left: 15px; border-right: 0; border-top: 0; }
    .bottom-right { bottom: 15px; right: 15px; border-left: 0; border-top: 0; }

    .btn-action {
      margin-top: 15px;
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-action:hover {
      background: var(--accent);
      color: #000;
    }

    .marker-ripple {
      width: 15px; height: 15px;
      background: var(--danger);
      border-radius: 50%;
      box-shadow: 0 0 15px var(--danger);
      position: relative;
    }
    .marker-ripple::after {
      content: ""; position: absolute; inset: 0;
      border: 2px solid var(--danger);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(4); opacity: 0; }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<aside id="sidebar">
  <div class="sidebar-header">
    <h2>📡 Emergency Dashboard</h2>
    <small style="color: var(--danger); font-weight: bold;">LIVE_LOCATION_ACTIVE</small>
  </div>
  
  <div id="data-container">
    <div id="empty-state" style="text-align: center; margin-top: 50px; opacity: 0.5;">
      [ SCANNING GRID... ]
    </div>
  </div>
</aside>

<div class="map-wrapper">
  <div class="hud-corner top-left"></div>
  <div class="hud-corner top-right"></div>
  <div class="hud-corner bottom-left"></div>
  <div class="hud-corner bottom-right"></div>
  
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>
  const socket = io();
  socket.emit('join_hospital');

  const map = L.map('map', { 
    zoomControl: false, 
    attributionControl: false 
  }).setView([26.8467, 80.9462], 13);

  L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
    subdomains:['mt0','mt1','mt2','mt3']
}).addTo(map);

  const dataContainer = document.getElementById("data-container");

  socket.on('accident_detected', (data) => {
    document.getElementById('empty-state')?.remove();

    const loc = data.sensorData?.location;
    if (!loc) return;

    const lat = parseFloat(loc.lat);
    const lng = parseFloat(loc.lng);

    const customIcon = L.divIcon({
      className: 'custom-marker',
      html: '<div class="marker-ripple"></div>',
      iconSize: [15, 15]
    });

    L.marker([lat, lng], { icon: customIcon }).addTo(map);
    map.flyTo([lat, lng], 15);

    const card = document.createElement('div');
    card.className = 'incident-card';
    card.innerHTML = `
      <div style="font-size: 0.7rem; color: var(--danger); margin-bottom: 5px;">▶ CRITICAL DETECTED</div>
      <h3 style="margin: 0; font-size: 1rem;">SEC: ${Math.floor(lat)}.${Math.floor(lng)}</h3>
      <p style="font-size: 0.8rem; color: #94a3b8; margin: 10px 0;">
        Time: ${new Date().toLocaleTimeString()}<br>
        Source: ${data.source || 'REMOTE_NODE'}
      </p>
      <button class="btn-action" onclick="window.open('https://www.google.com/maps?q=${lat},${lng}')">
        NAVIGATE
      </button>
    `;

    dataContainer.insertBefore(card, dataContainer.firstChild);
  });
</script>

</body>
</html>
