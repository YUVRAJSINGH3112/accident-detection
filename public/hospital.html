<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Emergency Dashboard</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 0;
      display: flex;
    }

    #sidebar {
      width: 30%;
      height: 100vh;
      overflow-y: auto;
      background: #f5f5f5;
      padding: 15px;
    }

    #map {
      width: 70%;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-top: 10px;
      border-left: 5px solid red;
    }

    .tagline {
      color: red;
      font-weight: bold;
      margin-bottom: 10px;
    }

    button {
      padding: 10px;
      background: #2196F3;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <h2>🚑 Emergency Dashboard</h2>

  <!-- 🔥 Tagline -->
  <p class="tagline">🚨Life at Risk – Immediate Response Needed</p>

  <!-- Dynamic data will come here -->
  <div id="data"></div>
</div>

<!-- Map -->
<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>
  const socket = io();

  socket.emit('join_hospital');
  // Map init
  const map = L.map('map').setView([26.8467, 80.9462], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; Sukrsha Help'
  }).addTo(map);

  let userMarker;

  const dataDiv = document.getElementById("data");

  // 🚨 Listen accident event
  socket.on('accident_detected', (data) => {
    const loc = data.sensorData?.location;

    if (!loc || !loc.lat || !loc.lng) return;

    const lat = parseFloat(loc.lat);
    const lng = parseFloat(loc.lng);

    // 🔴 Map marker
    if (userMarker) map.removeLayer(userMarker);

    userMarker = L.marker([lat, lng]).addTo(map)
      .bindPopup("🚨 Accident Location")
      .openPopup();

    map.setView([lat, lng], 15);

    // 📋 Sidebar update
    dataDiv.innerHTML = `
      <div class="card">
        <h3>🚨 Active Emergency</h3>
        <p><strong>Time:</strong> ${data.detectionTime}</p>
        <p><strong>Source:</strong> ${data.source}</p>
        <p><strong>Latitude:</strong> ${lat}</p>
        <p><strong>Longitude:</strong> ${lng}</p>
        <p><strong>Accuracy:</strong> ±${loc.accuracy || 'N/A'} m</p>

        <button onclick="openMap(${lat}, ${lng})">
          📍 Open in Google Maps
        </button>
      </div>
    `;
  });

  function openMap(lat, lng) {
    window.open(`https://www.google.com/maps?q=${lat},${lng}`);
  }
</script>

</body>
</html>
