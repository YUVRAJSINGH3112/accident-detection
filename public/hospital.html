<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Emergency Dashboard</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 0;
      display: flex;
    }

    #sidebar {
      width: 30%;
      height: 100vh;
      overflow-y: auto;
      background: #f5f5f5;
      padding: 15px;
    }

    #map {
      width: 70%;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-top: 10px;
      border-left: 5px solid red;
      animation: fadeIn 0.3s ease;
    }

    .tagline {
      color: red;
      font-weight: bold;
      margin-bottom: 10px;
    }

    button {
      padding: 10px;
      background: #2196F3;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <h2>🚑 Emergency Dashboard</h2>

  <p class="tagline">🚨 Life at Risk – Immediate Response Needed</p>

  <div id="data"></div>
</div>

<!-- Map -->
<div id="map"></div>

<!-- Scripts -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>
  const socket = io();

  socket.emit('join_hospital');

  // Map init
  const map = L.map('map').setView([26.8467, 80.9462], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; Suraksha Help'
  }).addTo(map);

  const dataDiv = document.getElementById("data");

  // Store all markers
  const markers = [];

  // 🚨 Listen accident event
  socket.on('accident_detected', (data) => {
    const loc = data.sensorData?.location;

    if (!loc || !loc.lat || !loc.lng) return;

    const lat = parseFloat(loc.lat);
    const lng = parseFloat(loc.lng);

    // ✅ ADD NEW MARKER (no delete)
    const marker = L.marker([lat, lng]).addTo(map)
      .bindPopup("🚨 Accident Location")
      .openPopup();

    markers.push(marker);

    // Optional: zoom to latest
    map.setView([lat, lng], 15);

    // ✅ ADD NEW CARD ON TOP (no overwrite)
    dataDiv.innerHTML = `
      <div class="card">
        <h3>🚨 Emergency Alert</h3>
        <p><strong>Time:</strong> ${data.detectionTime || new Date().toLocaleTimeString()}</p>
        <p><strong>Source:</strong> ${data.source}</p>
        <p><strong>Latitude:</strong> ${lat}</p>
        <p><strong>Longitude:</strong> ${lng}</p>
        <p><strong>Accuracy:</strong> ±${loc.accuracy || 'N/A'} m</p>

        <button onclick="openMap(${lat}, ${lng})">
          📍 Open in Google Maps
        </button>
      </div>
    ` + dataDiv.innerHTML;
  });

  function openMap(lat, lng) {
    window.open(`https://www.google.com/maps?q=${lat},${lng}`);
  }
</script>

</body>
</html>
